<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Formy02{% endblock %}</title>
  <script>
    (function () {
      try {
        var storedUserSet = localStorage.getItem('formy.themeUserSet');
        var storedTheme = localStorage.getItem('formy.theme');
        var params = new URLSearchParams(window.location.search);
        var hintedTheme = params.get('theme');
        var resolved = 'light';

        if (storedUserSet === 'true' && (storedTheme === 'light' || storedTheme === 'dark')) {
          resolved = storedTheme;
        } else if (hintedTheme === 'light' || hintedTheme === 'dark') {
          resolved = hintedTheme;
          localStorage.setItem('formy.theme', resolved);
        } else if (storedTheme === 'light' || storedTheme === 'dark') {
          resolved = storedTheme;
        }

        document.documentElement.classList.toggle('dark', resolved === 'dark');
        document.documentElement.style.colorScheme = resolved;
      } catch (err) {
        document.documentElement.classList.remove('dark');
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css" />
  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-canvas text-ink">
  <div class="page-bg">
    <header class="site-header">
      <nav class="shell header-inner" aria-label="Primary">
        <a class="brand" href="/">Formy02</a>
        <div class="nav-actions">
          {% block nav_extra %}{% endblock %}
          {% if user %}
            <a class="nav-link" href="/admin">Dashboard</a>
            <a class="nav-link" href="/admin/questions">Questions</a>
            <a class="nav-link" href="/admin/responses">Responses</a>
            <form method="post" action="/logout" class="logout-form">
              <button class="nav-link nav-button" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="nav-link" href="/login">Login</a>
          {% endif %}
          <button class="theme-toggle" type="button" onclick="toggleFormyTheme()" aria-label="Toggle theme">
            <span class="theme-light">Light</span>
            <span class="theme-dark">Dark</span>
          </button>
        </div>
      </nav>
    </header>

    <main class="shell main-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <span>Formy02</span>
        <span>Thoughtful questions, quietly collected.</span>
      </div>
    </footer>
  </div>

  <script>
    function toggleFormyTheme() {
      var current = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      var nextTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.classList.toggle('dark', nextTheme === 'dark');
      document.documentElement.style.colorScheme = nextTheme;
      localStorage.setItem('formy.theme', nextTheme);
      localStorage.setItem('formy.themeUserSet', 'true');
    }
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
